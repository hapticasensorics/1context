id = "memory.wiki.source_packet_shard"
version = "0.1.0"
label = "Wiki Source Packet Shard Witness"
agent = "wiki-source-shard"
tools = []
prompt_paths = ["prompts/wiki-source-packet-shard.md"]
inputs = ["bounded_source_packet_shard", "parent_route_contract"]
outputs = ["source_packet_shard_note"]

[params]
parent_route_id = "route id"
parent_job = "job id"
parent_job_key = "route job key"
shard_index = "1"
shard_count = "N"

[permissions]
read = ["bounded_source_packet_shard"]
write = ["runtime_shard_note"]
deny = ["wiki_source_mutation", "raw_data.query_by_default"]

[completion]
done = ["source_packet_shard_note.valid"]
skip = ["shard_contains_no_relevant_material"]
needs_wider_context = ["shard_points_to_missing_sibling_context"]
failure = ["invalid_shard_note", "claude_error"]
