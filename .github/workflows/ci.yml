name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Tool versions
        run: |
          swift --version
          xcodebuild -version
          brew --version
      - name: Install bundled web edge dependency
        run: |
          brew install caddy
          caddy version
      - run: ./scripts/check-version-consistency.sh
      - run: swift test --package-path macos
      - run: ./scripts/test.sh
      - run: ./scripts/test-upgrade-paths.sh
      - run: ALLOW_UNNOTARIZED=1 NOTARIZE=0 ./scripts/package-macos-release.sh
      - name: Packaged LaunchAgent smoke
        run: ONECONTEXT_ALLOW_LAUNCH_AGENT_SMOKE=1 ./scripts/test-launch-agent-package.sh
